name: gitleaks

# Secret scanning: fail CI if a credential is ever committed. Belt-and-suspenders
# for a public repo — .env files are gitignored, but this catches mistakes.

on:
  push:
    branches: [main]
  pull_request:

# The action lists PR commits to scan them, which needs read access to contents
# and pull requests (the default GITHUB_TOKEN is restricted otherwise → 403).
permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the whole repo is scanned
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
