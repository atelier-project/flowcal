name: gitleaks

# Secret scanning: fail CI if a credential is ever committed. Belt-and-suspenders
# for a public repo — .env files are gitignored, but this catches mistakes.
#
# Runs the gitleaks CLI directly (MIT, free) rather than the gitleaks-action
# wrapper, which requires a paid license on GitHub *organization* repos. This way
# the scan keeps working after the repo moves into an org — no license needed.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the whole repo is scanned
      - name: Run gitleaks
        run: |
          VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --verbose --exit-code 1
